version: '3.8'

services:
  # NestJS API
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-production
    container_name: buddy-script-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      FRONTEND_URL: ${FRONTEND_URL}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/documentation']
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Web App
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-production
    container_name: buddy-script-web
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      API_URL: ${API_URL}
    depends_on:
      api:
        condition: service_healthy
