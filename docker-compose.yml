version: '3.8'

services:
  # NestJS API
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-production
    container_name: buddy-script-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_DIRECT: ${DATABASE_URL_DIRECT}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET}
      UPLOADTHING_APP_ID: ${UPLOADTHING_APP_ID}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/documentation']
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Web App
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-production
    container_name: buddy-script-web
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      API_URL: http://api:3000
    depends_on:
      api:
        condition: service_healthy
