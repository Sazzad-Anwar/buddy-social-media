services:
  # API Service (NestJS)
  - type: web
    runtime: docker
    name: buddy-script-api
    repo: https://github.com/Sazzad-Anwar/buddy-social-media.git
    dockerfilePath: Dockerfile.api
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: UPLOADTHING_TOKEN
        sync: false
    healthCheckPath: /documentation
    autoDeploy: true

  # Web Service (Next.js)
  - type: web
    runtime: docker
    name: buddy-script-web
    repo: https://github.com/Sazzad-Anwar/buddy-social-media.git
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_URL
        fromService:
          name: buddy-script-api
          type: web
          property: host
    autoDeploy: true
